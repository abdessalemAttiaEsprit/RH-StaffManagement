spring.application.name=gestion_parking
spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=parking_db
# Show the MongoDB connection activity
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
# Show the actual queries being sent
logging.level.org.mongodb.driver.protocol.command=DEBUG
spring.jackson.deserialization.fail-on-null-for-primitives=false